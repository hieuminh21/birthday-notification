<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/auth-layout :: layout(pageTitle='Login', content=~{::content})}">
<div th:fragment="content">
    <div class="card auth-card">
        <div class="card-body">
            <div class="auth-title">Login</div>
            <p class="auth-subtitle">Nhập username và password để đăng nhập.</p>

            <div class="alert alert-danger" th:if="${loginError}">
                Username hoặc password không đúng.
            </div>
            <div class="alert alert-success" th:if="${loggedOut}">
                Bạn đã đăng xuất thành công.
            </div>

            <form class="auth-form" th:action="@{/login}" method="post">
                <div class="form-group mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input id="username"
                           name="username"
                           type="text"
                           class="form-control"
                           placeholder="Enter username"
                           autocomplete="username"
                           required>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input id="password"
                           name="password"
                           type="password"
                           class="form-control"
                           placeholder="Enter password"
                           autocomplete="current-password"
                           required>
                </div>

                <button type="submit" class="btn btn-primary btn-block auth-submit-btn">Login</button>
            </form>
        </div>
    </div>
</div>
</html>
