<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(pageTitle='Nhật Ký Gửi', activeMenu='logs', content=~{::content}, pageStyles=~{logList/assets :: pageStyles}, pageScripts=~{logList/assets :: pageScripts})}">
<div th:fragment="content">
    <div class="log-page">
        <div class="card border-0 shadow-sm log-card">
            <div class="card-body p-0">
                <div class="d-flex flex-wrap align-items-center justify-content-between log-toolbar">
                    <div>
                        <h2 class="h5 mb-1 text-dark">Nhật Ký Gửi</h2>
                        <p class="text-muted mb-0">Lịch sử lời chúc qua các kênh.</p>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover mb-0 log-table">
                        <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên nhân viên</th>
                            <th>Kênh gửi</th>
                            <th>Trạng thái</th>
                            <th>Thời gian gửi</th>
                            <th class="text-center">*</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="log : ${logs}">
                            <td th:text="${log.index}">1</td>
                            <td class="font-weight-bold" th:text="${log.employeeName}">Nguyen Van A</td>
                            <td th:text="${log.channel}">EMAIL</td>
                            <td>
                                <span class="status-badge"
                                      th:classappend="${log.status.name() == 'SUCCESS'} ? ' status-success' : ' status-failed'"
                                      th:text="${log.status}">SUCCESS</span>
                            </td>
                            <td th:text="${log.sendTime != null ? #temporals.format(log.sendTime, 'dd/MM/yyyy HH:mm:ss') : ''}">13/04/2026 08:00:00</td>
                            <td>
                                <div class="d-flex justify-content-center action-wrap">
                                    <a href="#"
                                       class="action-btn detail-btn js-open-log-detail"
                                       title="Chi tiet"
                                       aria-label="Chi tiet"
                                       th:attr="data-log-id=${log.logId},
                                                data-log-employee-name=${log.employeeName},
                                                data-log-channel=${log.channel},
                                                data-log-status=${log.status},
                                                data-log-send-time=${log.sendTime != null ? #temporals.format(log.sendTime, 'dd/MM/yyyy HH:mm:ss') : ''},
                                                data-log-message=${log.message},
                                                data-log-error=${log.errorMessage}">
                                        Xem
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(logs)}">
                            <td colspan="6" class="text-center text-muted py-4">Khong co du lieu nhat ky gui.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div th:replace="~{common/pagination :: pager(pagination=${pagination}, baseUrl=${baseUrl})}"></div>
            </div>
        </div>

        <div class="modal fade" id="logDetailModal" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
                <div class="modal-content log-modal">
                    <div class="modal-header">
                        <h5 class="modal-title">Chi Tiết Nhật Ký Gửi</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="row mb-2">
                            <div class="col-md-6"><strong>Nhân viên:</strong> <span id="detailEmployeeName"></span></div>
                            <div class="col-md-6"><strong>Kênh gửi:</strong> <span id="detailChannel"></span></div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-md-6"><strong>Trạng thái:</strong> <span id="detailStatus"></span></div>
                            <div class="col-md-6"><strong>Thời gian gửi:</strong> <span id="detailSendTime"></span></div>
                        </div>

                        <div class="form-group mb-3">
                            <label class="font-weight-bold" for="detailMessage">Nội dung đã gửi:</label>
                            <textarea id="detailMessage" class="form-control" rows="7" readonly></textarea>
                        </div>

                        <div class="form-group mb-0">
                            <label class="font-weight-bold" for="detailError">Lỗi</label>
                            <textarea id="detailError" class="form-control" rows="4" readonly></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-dismiss="modal">Đóng</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
