<nav xmlns:th="http://www.thymeleaf.org"

     style="width: 260px; min-height: 100vh;">
    <style>
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.12);
        }
    </style>

    <div class="mb-4">
        <div class="fw-bold fs-5 text-center">Birthday Notification</div>

    <ul class="nav nav-pills flex-column gap-2">
        <li class="nav-item">

               th:href="@{/}">

            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link rounded px-3 py-2"

        <li class="nav-item">

        <li class="nav-item">
