<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, activeMenu, content, pageStyles, pageScripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Birthday Notification'">Birthday Notification</title>
    <link th:href="@{/bootstrap-4.0.0-dist/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/common/layout/layout.css}" rel="stylesheet">
    <link th:href="@{/common/pagination/pagination.css}" rel="stylesheet">
    <th:block th:if="${pageStyles != null}" th:replace="${pageStyles}"></th:block>
</head>
<body class="app-body">
<div id="appShell" class="d-flex min-vh-100 app-shell">
    <aside th:replace="~{common/sidebar :: sidebar(activeMenu=${activeMenu})}"></aside>

    <div class="flex-grow-1 d-flex flex-column app-main">
        <header th:replace="~{common/header :: header(pageTitle=${pageTitle})}"></header>

        <main class="flex-grow-1 p-4 app-content">
            <div th:if="${content != null}" th:replace="${content}"></div>
            <div th:if="${content == null}" class="text-muted">
                Noi dung trang se duoc dat tai day.
            </div>
        </main>

        <footer th:replace="~{common/footer :: footer}"></footer>
    </div>
</div>

<script th:src="@{/bootstrap-4.0.0-dist/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/common/layout/layout.js}"></script>
<th:block th:if="${pageScripts != null}" th:replace="${pageScripts}"></th:block>
</body>
</html>
