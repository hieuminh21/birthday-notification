<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(pageTitle='Danh Sách Lời Chúc', activeMenu='messages', content=~{::content}, pageStyles=~{messageList/assets :: pageStyles}, pageScripts=~{messageList/assets :: pageScripts})}">
<div th:fragment="content">
    <div class="message-page">
        <div class="card border-0 shadow-sm message-card">
            <div class="card-body p-0">
                <div class="d-flex flex-wrap align-items-center justify-content-between message-toolbar">
                    <div>
                        <h2 class="h5 mb-1 text-dark">Danh Sách Lời Chúc</h2>
                        <p class="text-muted mb-0">Quản lý mẫu lời chúc hiển thị trong hệ thống.</p>
                    </div>
                    <button id="openCreateMessageModal" type="button" class="btn btn-primary btn-sm px-3">Thêm Lời Chúc</button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover mb-0 message-table">
                        <thead>
                        <tr>
                            <th>STT</th>
                            <th>Loại</th>
                            <th>Tên</th>
                            <th>Nội dung</th>
                            <th class="text-center">*</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="message, stat : ${messages}">
                            <td th:text="${pagination.currentPage * pagination.size + stat.count}">1</td>
                            <td th:text="${message.type}">BIRTHDAY</td>
                            <td class="font-weight-bold" th:text="${message.name}">Birthday Template Default</td>
                            <td class="message-content" th:text="${message.content}">Chúc mừng sinh nhật...</td>
                            <td>
                                <div class="d-flex justify-content-center action-wrap">
                                    <a href="#"
                                       class="action-btn edit-btn js-edit-message"
                                       title="Edit"
                                       aria-label="Edit"
                                       th:attr="data-message-id=${message.id},
                                                data-message-type=${message.type},
                                                data-message-name=${message.name},
                                                data-message-content=${message.content},
                                                data-message-is-active=${message.isActive},
                                                data-message-is-default=${message.isDefault}">
                                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                            <path d="M3 17.25V21h3.75L17.8 9.95l-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0l-1.96 1.96 3.75 3.75 2.13-1.79z"/>
                                        </svg>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(messages)}">
                            <td colspan="5" class="text-center text-muted py-4">Không có dữ liệu lời chúc.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div th:replace="~{common/pagination :: pager(pagination=${pagination}, baseUrl=${baseUrl})}"></div>
            </div>
        </div>

        <div class="modal fade" id="messageModal" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
                <div class="modal-content message-modal">
                    <div class="modal-header">
                        <h5 class="modal-title" id="messageModalTitle"
                            th:text="${modalMode != null and modalMode.name() == 'UPDATE'} ? 'Cập Nhật Lời Chúc' : 'Thêm Lời Chúc'">Thêm Lời Chúc</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <form id="messageForm"
                          th:object="${messageForm}"
                          th:action="${messageFormAction}"
                          method="post"
                          novalidate>
                        <div class="modal-body">
                            <div class="alert alert-danger mb-3" th:if="${#fields.hasGlobalErrors()}">
                                <p class="mb-0" th:each="error : ${#fields.globalErrors()}" th:text="${error}">Có lỗi.</p>
                            </div>

                            <div class="form-row">
                                <div class="form-group col-md-6">
                                    <label for="type">Loại</label>
                                    <select id="type" class="form-control" th:field="*{type}">
                                        <option value="">Chọn loại lời chúc</option>
                                        <option th:each="typeOption : ${messageTypes}"
                                                th:value="${typeOption}"
                                                th:text="${typeOption}">BIRTHDAY</option>
                                    </select>
                                    <small class="form-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></small>
                                </div>
                                <div class="form-group col-md-6">
                                    <label for="name">Tên</label>
                                    <input id="name" type="text" class="form-control" th:field="*{name}">
                                    <small class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
                                </div>
                            </div>

                            <div class="form-group mb-3">
                                <label for="content">Nội dung</label>
                                <textarea id="content" rows="8" class="form-control message-content-input" th:field="*{content}"></textarea>
                                <small class="form-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></small>
                            </div>

                            <div class="form-row">
                                <div class="form-group col-md-6 mb-0">
                                    <div class="custom-control custom-checkbox mt-2">
                                        <input type="checkbox" class="custom-control-input" id="isActive" th:field="*{isActive}">
                                        <label class="custom-control-label" for="isActive">Kích hoạt</label>
                                    </div>
                                </div>
                                <div class="form-group col-md-6 mb-0">
                                    <div class="custom-control custom-checkbox mt-2">
                                        <input type="checkbox" class="custom-control-input" id="isDefault" th:field="*{isDefault}">
                                        <label class="custom-control-label" for="isDefault">Mặc định</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-light" data-dismiss="modal">Hủy</button>
                            <button id="messageSubmitBtn" type="submit" class="btn btn-primary"
                                    th:text="${modalMode != null and modalMode.name() == 'UPDATE'} ? 'Cập Nhật' : 'Thêm Mới'">Thêm mới</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="messageModalState"
             th:attr="data-open-modal=${openMessageModal},data-modal-mode=${modalMode != null ? #strings.toLowerCase(modalMode.name()) : 'create'},data-form-action=${messageFormAction}"></div>
    </div>
</div>
</html>
